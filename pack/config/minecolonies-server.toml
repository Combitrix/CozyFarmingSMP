# MineColonies — Server-Config (Cozy Farming SMP)
# Synct beim Connect auf die Clients. Nur die bewusst gesetzten Keys stehen hier;
# alle übrigen Keys ergänzt MineColonies beim 1. Start automatisch mit ihren Defaults
# (ForgeConfigSpec füllt fehlende Einträge auf — diese Werte bleiben erhalten).
# Key-Namen verifiziert gegen ldtteam/minecolonies (version/main), ServerConfiguration.java.

[gameplay]
	# UNBEGRENZTE Kolonien pro Spieler — Standard ist 1 Kolonie/Spieler.
	# true = jeder Spieler darf beliebig viele Kolonien gründen (mehrere Zivilisationen/Spieler).
	allowinfinitecolonies = true
	# Kolonie-Chunks geladen halten, auch wenn niemand in der Nähe ist (Arbeiter laufen weiter).
	forceloadcolony = true
	# Radius (in Chunks) um eine Kolonie, der geladen bleibt. 3 reicht; höher = mehr RAM/TPS-Last.
	colonyloadstrictness = 3
	# Bürger pro Kolonie (Default 250 ist großzügig für ~5 Spieler).
	maxcitizenpercolony = 250

[claims]
	# Max. Claim-Radius einer Kolonie in CHUNKS (Default 20). Deutlich erhöht für GROSSE Kolonien.
	# Erlaubt sind 1–250; 30 = ~480 Blöcke Radius, reichlich Platz für große Zivilisationen.
	maxColonySize = 30
	# Mindestabstand zwischen Kolonie-Zentren in CHUNKS. Etwas erhöht, damit große Kolonien sich
	# beim Gründen nicht direkt überlappen und Platz für Zug-Trassen dazwischen bleibt.
	minColonyDistance = 16
	# maxdistancefromworldspawn NICHT gesetzt -> MineColonies-Default (30000 Blöcke). Reicht für
	# die große Terralith-Welt locker (60.000 Blöcke Durchmesser ums Spawn).

[permissions]
	# Kolonie-Schutz AN — verhindert Grief durch Mobs/fremde Spieler im Claim (wichtig auf SMP).
	enablecolonyprotection = true
